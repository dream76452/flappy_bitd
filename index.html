<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ecf0f1;
        }
        .game-container {
            text-align: center;
        }
        canvas {
            background-color: #70c5ce; /* Sky blue */
            border: 4px solid #34495e;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
        }
        h2 {
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h2>Flappy Bird</h2>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <p style="margin-top: 10px; font-size: 14px; color: #bdc3c7;">Press Spacebar or Click to Flap</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State Variables
        let frames = 0;
        let score = 0;
        let gameState = 'START'; // START, PLAYING, GAMEOVER

        // Bird Object
        const bird = {
            x: 80,
            y: 250,
            width: 24,
            height: 24,
            gravity: 0.45,
            velocity: 0,
            jumpStrength: -7.5,

            draw: function() {
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y + this.height/2, this.width/2, 0, Math.PI * 2);
                ctx.fill();
                
                // Eye
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x + 16, this.y + 8, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x + 17, this.y + 8, 2, 0, Math.PI * 2);
                ctx.fill();

                // Beak
                ctx.fillStyle = '#e67e22';
                ctx.fillRect(this.x + 18, this.y + 14, 8, 6);
            },

            update: function() {
                if (gameState === 'PLAYING') {
                    this.velocity += this.gravity;
                    this.y += this.velocity;

                    // Floor collision
                    if (this.y + this.height >= canvas.height - 60) {
                        this.y = canvas.height - 60 - this.height;
                        gameState = 'GAMEOVER';
                    }

                    // Ceiling collision
                    if (this.y <= 0) {
                        this.y = 0;
                        this.velocity = 0;
                    }
                } else if (gameState === 'START') {
                    // Idle hover animation
                    this.y = 250 + Math.sin(frames * 0.08) * 8;
                }
            },

            flap: function() {
                if (gameState === 'START') {
                    gameState = 'PLAYING';
                    this.velocity = this.jumpStrength;
                } else if (gameState === 'PLAYING') {
                    this.velocity = this.jumpStrength;
                } else if (gameState === 'GAMEOVER') {
                    resetGame();
                }
            }
        };

        // Pipes Object
        const pipes = {
            position: [],
            gap: 160,
            dx: 2.5,
            pipeWidth: 55,

            draw: function() {
                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    
                    // Top Pipe
                    ctx.fillStyle = '#27ae60';
                    ctx.fillRect(p.x, 0, this.pipeWidth, p.topHeight);
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(p.x - 4, p.topHeight - 24, this.pipeWidth + 8, 24);

                    // Bottom Pipe
                    ctx.fillStyle = '#27ae60';
                    let bottomY = p.topHeight + this.gap;
                    ctx.fillRect(p.x, bottomY, this.pipeWidth, canvas.height - bottomY - 60);
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(p.x - 4, bottomY, this.pipeWidth + 8, 24);
                }
            },

            update: function() {
                if (gameState !== 'PLAYING') return;

                // Spawn new pipes
                if (frames % 90 === 0) {
                    let minTop = 60;
                    let maxTop = canvas.height - 60 - this.gap - 60;
                    let topHeight = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;
                    
                    this.position.push({
                        x: canvas.width,
                        topHeight: topHeight,
                        scored: false
                    });
                }

                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    p.x -= this.dx;

                    // Collision detection
                    if (bird.x + bird.width > p.x && bird.x < p.x + this.pipeWidth) {
                        if (bird.y < p.topHeight || bird.y + bird.height > p.topHeight + this.gap) {
                            gameState = 'GAMEOVER';
                        }
                    }

                    // Score update
                    if (p.x + this.pipeWidth < bird.x && !p.scored) {
                        score++;
                        p.scored = true;
                    }

                    // Remove off-screen pipes
                    if (p.x + this.pipeWidth <= 0) {
                        this.position.shift();
                        i--;
                    }
                }
            }
        };

        // Ground Object
        const ground = {
            draw: function() {
                ctx.fillStyle = '#ded895';
                ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
                ctx.fillStyle = '#c0b97d';
                ctx.fillRect(0, canvas.height - 60, canvas.width, 8);
                
                // Ground texture lines
                ctx.strokeStyle = '#b8b070';
                ctx.lineWidth = 2;
                for(let i = 0; i < canvas.width; i += 20) {
                    ctx.beginPath();
                    ctx.moveTo(i, canvas.height - 52);
                    ctx.lineTo(i + 10, canvas.height - 60);
                    ctx.stroke();
                }
            }
        };

        // UI Object
        const ui = {
            draw: function() {
                ctx.fillStyle = '#fff';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.textAlign = 'center';
                
                if (gameState === 'START') {
                    ctx.font = 'bold 28px Arial';
                    ctx.strokeText('Ready?', canvas.width / 2, canvas.height / 2 - 40);
                    ctx.fillText('Ready?', canvas.width / 2, canvas.height / 2 - 40);
                    
                    ctx.font = '18px Arial';
                    ctx.strokeText('Click or Press Space', canvas.width / 2, canvas.height / 2);
                    ctx.fillText('Click or Press Space', canvas.width / 2, canvas.height / 2);
                } else if (gameState === 'PLAYING') {
                    ctx.font = 'bold 40px Arial';
                    ctx.strokeText(score, canvas.width / 2, 60);
                    ctx.fillText(score, canvas.width / 2, 60);
                } else if (gameState === 'GAMEOVER') {
                    ctx.font = 'bold 36px Arial';
                    ctx.strokeText('Game Over', canvas.width / 2, canvas.height / 2 - 30);
                    ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 30);
                    
                    ctx.font = '24px Arial';
                    ctx.strokeText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 10);
                    ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 10);
                    
                    ctx.font = '16px Arial';
                    ctx.strokeText('Click to Restart', canvas.width / 2, canvas.height / 2 + 50);
                    ctx.fillText('Click to Restart', canvas.width / 2, canvas.height / 2 + 50);
                }
            }
        };

        function resetGame() {
            gameState = 'START';
            score = 0;
            bird.y = 250;
            bird.velocity = 0;
            pipes.position = [];
            frames = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bird.draw();
            pipes.draw();
            ground.draw();
            ui.draw();
        }

        function update() {
            bird.update();
            pipes.update();
        }

        function loop() {
            update();
            draw();
            frames++;
            requestAnimationFrame(loop);
        }

        // Event Listeners
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                bird.flap();
            }
        });

        canvas.addEventListener('click', function() {
            bird.flap();
        });

        // Initialize Game Loop
        loop();
    </script>
</body>
</html>
